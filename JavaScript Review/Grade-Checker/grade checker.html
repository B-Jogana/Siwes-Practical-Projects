<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Exam Grade Checker</title>
  <link rel="stylesheet" href="test.css">
</head>
<body>

  <h1>Exam Grade Checker</h1>
  <p>Enter your score to see your grade:</p>

  <input type="number" id="scoreInput" placeholder="Enter your score" />
  <button onclick="checkGrade()">Check Grade</button>

  <div id="result"></div>

  <script>
    const checkGrade = () => {
        const score = parseInt(document.getElementById("scoreInput").value);
      let grade = "";

      if (score >= 70 && score <= 100) {
        grade = "A";
      } else if (score >= 60 && score < 70) {
        grade = "B";
      } else if (score >= 50 && score < 60) {
        grade = "C";
      } else if (score >= 45 && score < 50) {
        grade = "D";
      } else if (score >= 40 && score < 45) {
        grade = "E";
      } else if (score >= 0 && score < 40) {
        grade = "F";
      } else {
        grade = "Invalid score";
      }

      document.getElementById("result").innerText = `Your Grade: ${grade}`;
    };
  </script>

</body>
</html>
